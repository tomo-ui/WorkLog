<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="WorkLog PL">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#007AFF">
<link rel="manifest" id="pwa-manifest">
<title>WorkLog PL</title>

<style>
/* ═══ RESET ═══ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%;-webkit-text-size-adjust:100%}
body{
  height:100%;
  font-family:-apple-system,'Helvetica Neue',sans-serif;
  background:#F2F2F7;
  color:#000;
  overscroll-behavior:none;
  -webkit-font-smoothing:antialiased;
}
input,textarea,button,select{font-family:inherit;font-size:inherit}
button{cursor:pointer;border:none;background:none}

/* ═══ CSS VARIABLES ═══ */
:root{
  --blue:#007AFF; --green:#34C759; --red:#FF3B30;
  --orange:#FF9500; --purple:#AF52DE;
  --gray1:#8E8E93; --gray2:#AEAEB2; --gray5:#E5E5EA; --gray6:#F2F2F7;
  --sep:rgba(60,60,67,.12);
  --bg:#F2F2F7; --bg-card:#FFF; --text:#000; --text2:#3C3C43CC; --text3:#8E8E93;
  --nav-bg:rgba(242,242,247,.94);
  --shadow:0 2px 16px rgba(0,0,0,.08),0 1px 3px rgba(0,0,0,.06);
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
  --safe-l:env(safe-area-inset-left,0px);
  --safe-r:env(safe-area-inset-right,0px);
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1C1C1E; --bg-card:#2C2C2E; --text:#FFF; --text2:rgba(235,235,245,.6);
    --text3:#8E8E93; --sep:rgba(84,84,88,.65); --gray5:#3A3A3C; --gray6:#1C1C1E;
    --nav-bg:rgba(28,28,30,.94);
    --shadow:0 2px 16px rgba(0,0,0,.4);
  }
}

/* ═══ APP SHELL ═══ */
#app{
  display:flex;flex-direction:column;
  height:100dvh;
  max-width:430px;margin:0 auto;
  position:relative;overflow:hidden;
  background:var(--bg);
}

/* ═══ NAVBAR ═══ */
#navbar{
  background:var(--nav-bg);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--sep);
  padding-top:var(--safe-top);
  flex-shrink:0;
  position:relative;z-index:100;
  transition:background .2s;
}
.nb-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 8px;height:44px;
}
.nb-title{font-size:17px;font-weight:600;color:var(--text);flex:1;text-align:center;}
.nb-large{
  font-size:34px;font-weight:700;color:var(--text);
  padding:4px 16px 12px;
}
.nb-btn{
  color:var(--blue);font-size:17px;padding:6px 8px;
  display:flex;align-items:center;gap:3px;min-width:60px;
  transition:opacity .15s;
}
.nb-btn:active{opacity:.4}
.nb-btn.right{justify-content:flex-end}
.nb-btn.left{justify-content:flex-start}
.nb-btn svg{flex-shrink:0}
.nb-btn.danger{color:var(--red)}
.nb-btn:disabled{opacity:.3;pointer-events:none}

/* ═══ SCREEN / SCROLL AREA ═══ */
#screen{
  flex:1;overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
  background:var(--bg);
  position:relative;
}
#screen::-webkit-scrollbar{display:none}
.screen-pad{
  padding:12px 0 calc(var(--safe-bot) + 32px);
}

/* ═══ SCREEN TRANSITIONS ═══ */
.slide-in{animation:slideIn .28s cubic-bezier(.22,1,.36,1) forwards}
.slide-back{animation:slideBack .28s cubic-bezier(.22,1,.36,1) forwards}
@keyframes slideIn{from{transform:translateX(100%);opacity:.6}to{transform:translateX(0);opacity:1}}
@keyframes slideBack{from{transform:translateX(-30%);opacity:.6}to{transform:translateX(0);opacity:1}}

/* ═══ CARDS & LIST ═══ */
.card{
  background:var(--bg-card);border-radius:12px;
  margin:0 16px;overflow:hidden;
  box-shadow:var(--shadow);
}
.card+.card{margin-top:8px}
.section-header{
  font-size:13px;color:var(--text3);
  text-transform:uppercase;letter-spacing:.4px;
  padding:16px 32px 6px;
}
.row{
  display:flex;align-items:center;padding:13px 16px;
  border-bottom:1px solid var(--sep);
  transition:background .12s;position:relative;
}
.row:last-child{border-bottom:none}
.row.tap:active{background:rgba(0,0,0,.06)}
@media(prefers-color-scheme:dark){.row.tap:active{background:rgba(255,255,255,.06)}}
.row-main{flex:1}
.row-title{font-size:17px;font-weight:500;color:var(--text)}
.row-sub{font-size:13px;color:var(--text2);margin-top:3px;display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.row-meta{font-size:12px;color:var(--text3);margin-top:2px}
.chevron{color:var(--gray2);margin-left:6px;flex-shrink:0}
.chevron svg{display:block}

/* ═══ SUMMARY CARDS ═══ */
.summary-row{display:flex;gap:12px;padding:0 16px;margin-bottom:12px}
.sum-card{
  flex:1;background:var(--bg-card);border-radius:16px;
  padding:14px;box-shadow:var(--shadow);min-width:0;
}
.sum-head{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.sum-icon{
  width:22px;height:22px;border-radius:6px;
  display:flex;align-items:center;justify-content:center;
}
.sum-label{font-size:12px;color:var(--text3);font-weight:500}
.sum-val{font-size:19px;font-weight:700;color:var(--text);letter-spacing:-.3px;word-break:break-all}

/* ═══ CALENDAR ═══ */
.cal-card{
  background:var(--bg-card);border-radius:16px;
  margin:0 16px 12px;padding:14px;box-shadow:var(--shadow);
}
.cal-nav{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:10px;
}
.cal-month-label{font-size:17px;font-weight:700;color:var(--text)}
.cal-nav-btn{
  color:var(--blue);padding:4px 8px;font-size:22px;
  border-radius:8px;transition:background .1s;
}
.cal-nav-btn:active{background:rgba(0,122,255,.12)}
.cal-wdays{
  display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:6px;
}
.cal-wd{
  text-align:center;font-size:12px;font-weight:600;
  color:var(--text3);padding:3px 0;
}
.cal-wd.we{color:rgba(255,59,48,.7)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-day{
  aspect-ratio:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  border-radius:50%;cursor:pointer;gap:2px;
  transition:background .15s,transform .1s;
}
.cal-day:active{transform:scale(.88)}
.cal-day.empty{pointer-events:none}
.cal-day.we .cal-num{color:var(--red)}
.cal-day.today{border:1.5px solid var(--blue)}
.cal-day.today .cal-num{font-weight:700;color:var(--blue)}
.cal-day.sel{background:var(--blue);box-shadow:0 4px 12px rgba(0,122,255,.4)}
.cal-day.sel .cal-num{color:#fff;font-weight:600}
.cal-day.sel .cal-dot{background:rgba(255,255,255,.9)}
.cal-num{font-size:14px;line-height:1;color:var(--text)}
.cal-dot{width:4px;height:4px;border-radius:50%;background:transparent}
.cal-day.has-entry .cal-dot{background:var(--green)}
.cal-day.sel.has-entry .cal-dot{background:rgba(255,255,255,.9)}

/* ═══ DAY DETAIL ═══ */
.day-card{
  background:var(--bg-card);border-radius:16px;
  margin:0 16px 12px;padding:16px;box-shadow:var(--shadow);
  animation:popIn .25s cubic-bezier(.34,1.4,.64,1);
}
@keyframes popIn{from{opacity:0;transform:translateY(-12px) scale(.97)}to{opacity:1;transform:none}}
.day-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
.day-title{font-size:16px;font-weight:600;color:var(--text)}
.day-stats{display:flex;gap:10px;margin-top:3px}
.day-stat{font-size:12px;font-weight:600}
.day-stat.b{color:var(--blue)}.day-stat.g{color:var(--green)}
.pill-btn{
  background:var(--blue);color:#fff;border-radius:20px;
  padding:6px 14px;font-size:14px;font-weight:600;
  display:flex;align-items:center;gap:4px;flex-shrink:0;
  transition:opacity .12s,transform .1s;
}
.pill-btn:active{opacity:.8;transform:scale(.96)}
.day-sep{height:1px;background:var(--sep);margin:0 0 10px}
.entry-row2{
  display:flex;align-items:center;padding:8px 6px;
  border-radius:10px;cursor:pointer;transition:background .1s;
}
.entry-row2:active{background:rgba(0,0,0,.05)}
@media(prefers-color-scheme:dark){.entry-row2:active{background:rgba(255,255,255,.07)}}
.et-times{flex:1}
.et-line{display:flex;align-items:center;gap:6px;margin-bottom:2px}
.et-icon{
  width:14px;height:14px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:7px;color:#fff;flex-shrink:0;
}
.et-icon.g{background:var(--green)}.et-icon.r{background:var(--red)}
.et-time{font-size:15px;font-weight:600;color:var(--text)}
.et-note{font-size:12px;color:var(--text3);margin-top:2px;padding-left:20px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px}
.et-right{text-align:right;flex-shrink:0}
.et-dur{font-size:15px;font-weight:700;color:var(--blue)}
.et-earn{font-size:13px;font-weight:600;color:var(--green);margin-top:2px}
.et-rate{font-size:11px;color:var(--text3);margin-top:1px}
.et-divider{height:1px;background:var(--sep);margin:2px 0}
.empty-day{text-align:center;padding:20px;color:var(--text3);font-size:14px}

/* ═══ FORM ═══ */
.form-sec-title{
  font-size:13px;color:var(--text3);text-transform:uppercase;
  letter-spacing:.4px;padding:16px 32px 6px;
}
.form-row{
  display:flex;align-items:center;
  padding:13px 16px;border-bottom:1px solid var(--sep);min-height:50px;
}
.form-row:last-child{border-bottom:none}
.form-label{font-size:17px;color:var(--text);flex-shrink:0}
.form-right{flex:1;display:flex;align-items:center;justify-content:flex-end;gap:6px}
.form-input{
  font-size:17px;color:var(--blue);background:none;border:none;
  outline:none;text-align:right;width:100%;
}
.form-input::placeholder{color:var(--gray2)}
.form-unit{font-size:15px;color:var(--text3);flex-shrink:0}
.form-textarea{
  font-size:17px;color:var(--blue);background:none;border:none;
  outline:none;width:100%;resize:none;
  min-height:44px;line-height:1.5;
}
.form-textarea::placeholder{color:var(--gray2)}
/* native date/time inputs styled */
input[type="date"],input[type="time"]{
  font-size:17px;color:var(--blue);background:none;border:none;
  outline:none;text-align:right;-webkit-appearance:none;
  padding:0;font-family:inherit;width:auto;max-width:160px;
}
input[type="number"]{
  font-size:17px;color:var(--blue);background:none;border:none;
  outline:none;text-align:right;width:70px;-moz-appearance:textfield;
}
input[type="number"]::-webkit-inner-spin-button,
input[type="number"]::-webkit-outer-spin-button{-webkit-appearance:none}

/* calc preview rows */
.calc-row{
  display:flex;align-items:center;gap:8px;
  padding:10px 16px;background:rgba(0,122,255,.05);
  border-bottom:1px solid var(--sep);
}
.calc-row:last-child{border-bottom:none}
.calc-label{font-size:15px;color:var(--text2);flex:1}
.calc-val{font-size:15px;font-weight:700}
.calc-val.b{color:var(--blue)}.calc-val.g{color:var(--green)}
.warn-row{
  display:flex;align-items:center;gap:8px;
  padding:10px 16px;background:rgba(255,149,0,.07);
  border-bottom:1px solid var(--sep);
}
.warn-row span{font-size:13px;color:var(--orange)}
.del-row{
  display:flex;align-items:center;justify-content:center;gap:6px;
  padding:14px 16px;font-size:17px;color:var(--red);
  transition:opacity .12s;
}
.del-row:active{opacity:.5}

/* ═══ EMPTY STATE ═══ */
.empty-state{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:16px;padding:80px 32px;text-align:center;
  min-height:60vh;
}
.empty-icon{font-size:72px;filter:saturate(.8)}
.empty-title{font-size:22px;font-weight:700;color:var(--text)}
.empty-sub{font-size:15px;color:var(--text3);line-height:1.6;max-width:260px}
.big-btn{
  background:var(--blue);color:#fff;border-radius:14px;
  padding:15px 32px;font-size:17px;font-weight:600;
  box-shadow:0 6px 20px rgba(0,122,255,.35);margin-top:8px;
  transition:all .15s;
}
.big-btn:active{transform:scale(.97);opacity:.9}

/* ═══ MONTH ROW ═══ */
.month-earn{
  background:rgba(52,199,89,.12);color:var(--green);
  padding:2px 9px;border-radius:10px;font-size:13px;font-weight:600;
  display:inline-flex;align-items:center;
}

/* ═══ BOTTOM EXPORT BAR ═══ */
.export-bar{
  position:sticky;bottom:0;
  background:var(--nav-bg);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--sep);
  padding:12px 16px calc(var(--safe-bot) + 12px);
}
.export-btn{
  width:100%;background:var(--blue);color:#fff;border-radius:14px;
  padding:15px;font-size:17px;font-weight:600;
  display:flex;align-items:center;justify-content:center;gap:8px;
  box-shadow:0 4px 16px rgba(0,122,255,.35);transition:all .15s;
}
.export-btn:active{transform:scale(.98);opacity:.9}

/* ═══ PRINT PREVIEW ═══ */
.print-card{
  background:var(--bg-card);border-radius:12px;
  margin:0 16px 12px;overflow:hidden;box-shadow:var(--shadow);
}
.print-hdr{
  background:linear-gradient(135deg,#1e3a8a,#2563eb);
  color:#fff;padding:16px;
}
.print-hdr-title{font-size:18px;font-weight:700}
.print-hdr-sub{font-size:13px;opacity:.8;margin-top:2px}
.print-hdr-date{font-size:10px;opacity:.55;margin-top:4px}
.pt{display:grid;grid-template-columns:80px 56px 52px 52px 52px 60px 1fr;font-size:9.5px}
.pt-head{background:#1e40af;color:#fff;font-weight:700}
.pt-head>div,.pt-row>div{padding:6px 5px}
.pt-row{border-bottom:1px solid var(--sep)}
.pt-row:nth-child(even){background:rgba(0,0,0,.025)}
@media(prefers-color-scheme:dark){.pt-row:nth-child(even){background:rgba(255,255,255,.03)}}
.pt-row>div:last-child{color:var(--green);font-weight:600}
.pt-sum{background:rgba(0,122,255,.08);font-weight:700;border-top:2px solid var(--blue)}
.pt-sum>div{padding:7px 5px;color:var(--blue)}
.pt-sum>div:last-child{color:var(--green)}

/* ═══ TOAST ═══ */
#toast{
  position:fixed;bottom:calc(var(--safe-bot) + 80px);
  left:50%;transform:translateX(-50%) translateY(16px);
  background:rgba(40,40,40,.9);backdrop-filter:blur(12px);
  color:#fff;padding:10px 18px;border-radius:22px;
  font-size:14px;font-weight:500;white-space:nowrap;
  pointer-events:none;opacity:0;transition:all .28s;z-index:999;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ═══ MODAL OVERLAY (share sheet) ═══ */
#modal{
  position:fixed;inset:0;background:rgba(0,0,0,.45);
  display:flex;align-items:flex-end;z-index:500;
  opacity:0;pointer-events:none;transition:opacity .25s;
}
#modal.open{opacity:1;pointer-events:all}
.sheet{
  background:var(--gray6);border-radius:14px 14px 0 0;
  padding:12px 16px calc(var(--safe-bot)+16px);width:100%;
  transform:translateY(100%);transition:transform .35s cubic-bezier(.34,1.1,.64,1);
}
#modal.open .sheet{transform:translateY(0)}
.sheet-handle{
  width:36px;height:5px;border-radius:3px;
  background:rgba(0,0,0,.18);margin:0 auto 14px;
}
@media(prefers-color-scheme:dark){.sheet-handle{background:rgba(255,255,255,.2)}}
.sheet-title{text-align:center;font-size:13px;font-weight:600;color:var(--text3);margin-bottom:16px}
.share-icons{
  display:flex;gap:14px;overflow-x:auto;padding-bottom:8px;margin-bottom:14px;
  scrollbar-width:none;
}
.share-icons::-webkit-scrollbar{display:none}
.sh-item{
  display:flex;flex-direction:column;align-items:center;gap:6px;
  flex-shrink:0;cursor:pointer;transition:opacity .12s;
}
.sh-item:active{opacity:.6}
.sh-bubble{
  width:58px;height:58px;border-radius:14px;
  display:flex;align-items:center;justify-content:center;font-size:28px;
}
.sh-label{font-size:11px;color:var(--text);text-align:center;max-width:64px}
.sheet-cancel{
  width:100%;background:var(--bg-card);border-radius:14px;
  padding:16px;font-size:17px;font-weight:600;color:var(--blue);
  transition:opacity .12s;
}
.sheet-cancel:active{opacity:.6}

/* ═══ @PRINT ═══ */
@media print{
  #app,body{background:#fff!important;height:auto!important;overflow:visible!important}
  #navbar,#toast,#modal,.export-bar,.day-card,.cal-card,.summary-row,
  .empty-state,.section-header,.card[data-hide-print]{display:none!important}
  .screen-pad{padding:0!important}
  .print-card{box-shadow:none!important;border-radius:0!important;margin:0!important}
  .print-hdr{print-color-adjust:exact;-webkit-print-color-adjust:exact}
  .pt-head{print-color-adjust:exact;-webkit-print-color-adjust:exact}
}

/* ═══ MISC ═══ */
.tag-blue{
  background:rgba(0,122,255,.1);color:var(--blue);
  padding:2px 8px;border-radius:8px;font-size:12px;font-weight:600;
}
.tag-green{
  background:rgba(52,199,89,.12);color:var(--green);
  padding:2px 8px;border-radius:8px;font-size:12px;font-weight:600;
}
.divider{height:1px;background:var(--sep)}
.mt8{margin-top:8px}
.info-banner{
  background:rgba(0,122,255,.07);border-radius:12px;
  margin:0 16px 12px;padding:12px 14px;
  display:flex;align-items:flex-start;gap:10px;
}
.info-banner p{font-size:13px;color:var(--blue);line-height:1.5}
</style>
</head>
<body>
<div id="app">
  <div id="navbar"></div>
  <div id="screen"></div>
</div>
<div id="modal" onclick="closeModal(event)">
  <div class="sheet" id="modal-sheet"></div>
</div>
<div id="toast"></div>

<script>
/* ════════════════════════════════════════
   PWA SETUP
════════════════════════════════════════ */
(function(){
  const icon = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><rect width="512" height="512" rx="112" fill="#007AFF"/><circle cx="256" cy="256" r="170" fill="none" stroke="white" stroke-width="36"/><line x1="256" y1="256" x2="256" y2="140" stroke="white" stroke-width="32" stroke-linecap="round"/><line x1="256" y1="256" x2="316" y2="310" stroke="white" stroke-width="32" stroke-linecap="round"/><circle cx="256" cy="256" r="18" fill="white"/></svg>`;
  const iconB64 = 'data:image/svg+xml;base64,' + btoa(icon);
  const m = {
    name:'WorkLog PL',short_name:'WorkLog PL',
    start_url:location.href,
    display:'standalone',orientation:'portrait',
    background_color:'#F2F2F7',theme_color:'#007AFF',
    icons:[{src:iconB64,sizes:'512x512',type:'image/svg+xml',purpose:'any maskable'}]
  };
  const blob = new Blob([JSON.stringify(m)],{type:'application/json'});
  document.getElementById('pwa-manifest').href = URL.createObjectURL(blob);

  // Apple touch icon
  const li = document.createElement('link');
  li.rel='apple-touch-icon'; li.href=iconB64;
  document.head.appendChild(li);

  // Service Worker (inline blob)
  if('serviceWorker' in navigator){
    const sw=`
const CACHE='wl-v2';
self.addEventListener('install',e=>e.waitUntil(caches.open(CACHE).then(c=>c.add(new Request(self.location.href,{cache:'no-cache'})))));
self.addEventListener('activate',e=>e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==CACHE).map(k=>caches.delete(k))))));
self.addEventListener('fetch',e=>{if(e.request.method!=='GET')return;e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{if(res&&res.status===200){const c=res.clone();caches.open(CACHE).then(cache=>cache.put(e.request,c));}return res;})));});`;
    const swBlob = new Blob([sw],{type:'application/javascript'});
    const swURL = URL.createObjectURL(swBlob);
    navigator.serviceWorker.register(swURL).catch(()=>{});
  }
})();

/* ════════════════════════════════════════
   DATA LAYER
════════════════════════════════════════ */
const STORE_KEY = 'wl_entries_v1';
let entries = [];

function loadEntries(){
  try { entries = JSON.parse(localStorage.getItem(STORE_KEY)||'[]'); }
  catch(e){ entries=[]; }
}
function saveEntries(){ localStorage.setItem(STORE_KEY, JSON.stringify(entries)); }

function genId(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }

function addEntry(e){ entries.push({...e, id:genId()}); saveEntries(); }
function updateEntry(id, upd){
  const i = entries.findIndex(e=>e.id===id);
  if(i>=0){ entries[i]={...entries[i],...upd}; saveEntries(); }
}
function deleteEntry(id){ entries=entries.filter(e=>e.id!==id); saveEntries(); }

// Computed helpers
function toMin(hhmm){ const [h,m]=hhmm.split(':').map(Number); return h*60+m; }
function entryMin(e){ return Math.max(0, toMin(e.wyjscie)-toMin(e.wejscie)); }
function entryEarn(e){ return (entryMin(e)/60)*e.stawka; }
function fmtMin(min){ const h=Math.floor(min/60),m=min%60; return m?`${h}h ${m}min`:`${h}h`; }
function fmtDur(min){ const h=Math.floor(min/60),m=min%60; return `${h}:${String(m).padStart(2,'0')}`; }
function fmtMoney(n){ return n.toFixed(2).replace('.',',')+'ŚÂł'; }
function fmtMoneyN(n){ return n.toFixed(2).replace('.',',')+'\u00a0z\u0142'; }

// Group entries by month key YYYY-MM
function groupByMonth(){
  const map = {};
  entries.forEach(e=>{
    const k = e.date.slice(0,7);
    if(!map[k]) map[k]=[];
    map[k].push(e);
  });
  return Object.keys(map).sort((a,b)=>b.localeCompare(a)).map(k=>({key:k,entries:map[k]}));
}

// Polish date helpers
const PL_MONTHS = ['Styczeń','Luty','Marzec','Kwiecień','Maj','Czerwiec',
                   'Lipiec','Sierpień','Wrzesień','Październik','Listopad','Grudzień'];
const PL_MONTHS_GEN = ['Stycznia','Lutego','Marca','Kwietnia','Maja','Czerwca',
                        'Lipca','Sierpnia','Września','Października','Listopada','Grudnia'];
const PL_DAYS_LONG = ['Niedziela','Poniedziałek','Wtorek','Środa','Czwartek','Piątek','Sobota'];
const PL_DAYS_SHORT = ['Nd','Pn','Wt','Śr','Cz','Pt','Sb'];

function parseYM(key){ const [y,m]=key.split('-').map(Number); return {year:y,month:m}; }
function monthLabel(key){ const {year,month}=parseYM(key); return `${PL_MONTHS[month-1]} ${year}`; }
function daysInMonth(year,month){ return new Date(year,month,0).getDate(); }
function firstWeekday(year,month){
  // 0=Sun→convert to Mon-first: Mon=0…Sun=6
  const wd = new Date(year,month-1,1).getDay();
  return (wd+6)%7;
}
function dateStr(y,m,d){ return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }
function todayStr(){ const n=new Date(); return dateStr(n.getFullYear(),n.getMonth()+1,n.getDate()); }
function dayOfWeek(datestring){
  const d=new Date(datestring+'T12:00:00');
  return d.getDay(); // 0=Sun
}
function fmtDatePL(datestring){
  const [y,m,d]=datestring.split('-').map(Number);
  return `${d} ${PL_MONTHS_GEN[m-1]} ${y}`;
}
function fmtDateShort(datestring){
  const [y,m,d]=datestring.split('-').map(Number);
  return `${String(d).padStart(2,'0')}.${String(m).padStart(2,'0')}.${y}`;
}
function dayLabelPL(datestring){
  const wd=dayOfWeek(datestring);
  return PL_DAYS_LONG[wd];
}
function dayShortPL(datestring){
  const wd=dayOfWeek(datestring);
  return PL_DAYS_SHORT[(wd+6)%7]; // Mon-first
}

/* ════════════════════════════════════════
   NAVIGATION STATE
════════════════════════════════════════ */
let navStack = []; // [{screen, params}]
let currentMonthKey = null;
let selectedCalDay  = null;
let editingId       = null;
let formPresetDay   = null;
let printMonthKey   = null;

const today = todayStr();
const todayYM = today.slice(0,7);

function push(screen, params={}){
  navStack.push({screen, params});
  render(screen, params, 'push');
}
function pop(){
  navStack.pop();
  const prev = navStack[navStack.length-1];
  if(prev) render(prev.screen, prev.params, 'pop');
}
function replaceTop(screen, params={}){
  navStack[navStack.length-1]={screen,params};
  render(screen, params, 'push');
}

/* ════════════════════════════════════════
   RENDER ROUTER
════════════════════════════════════════ */
function render(screen, params, dir='push'){
  const sc = document.getElementById('screen');
  const anim = dir==='push' ? 'slide-in' : 'slide-back';
  sc.classList.remove('slide-in','slide-back');
  void sc.offsetWidth;
  sc.classList.add(anim);

  switch(screen){
    case 'months':     renderMonths(); break;
    case 'month':      renderMonth(params.key); break;
    case 'form':       renderForm(params); break;
    case 'print':      renderPrint(params.key); break;
  }
}

   SCREEN: MONTH DETAIL

function renderMonth(key){
  currentMonthKey = key;
  // If selected day not in this month, clear it
  if(selectedCalDay && !selectedCalDay.startsWith(key)) selectedCalDay=null;

  const {year,month} = parseYM(key);
  const monthEntries = entries.filter(e=>e.date.startsWith(key));
  const valid = monthEntries.filter(e=>entryMin(e)>0);
  const totalMin   = valid.reduce((s,e)=>s+entryMin(e),0);
  const totalEarn  = valid.reduce((s,e)=>s+entryEarn(e),0);

  // Build set of days with entries
  const daysWithEntry = new Set(monthEntries.map(e=>e.date));

  renderNavbar({
    back: {label:'Wstecz', fn:'pop()'},
    title: monthLabel(key),
    right: {label:'<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8M16 6l-4-4-4 4M12 2v13"/></svg>', fn:`goExport('${key}')`}
  });

  // Calendar grid
  const offset = firstWeekday(year,month);
  const days   = daysInMonth(year,month);
  let calCells = '';
  for(let i=0;i<offset;i++) calCells+=`<div class="cal-day empty"></div>`;
  for(let d=1;d<=days;d++){
    const ds = dateStr(year,month,d);
    const wd = (offset+d-1)%7; // 0=Mon
    const isWE = wd===5||wd===6;
    const isToday = ds===today;
    const hasSel  = ds===selectedCalDay;
    const hasE    = daysWithEntry.has(ds);
    let cls='cal-day';
    if(isWE) cls+=' we';
    if(isToday) cls+=' today';
    if(hasSel)  cls+=' sel';
    if(hasE)    cls+=' has-entry';
    calCells+=`<div class="${cls}" onclick="calTap('${ds}')"><span class="cal-num">${d}</span><span class="cal-dot"></span></div>`;
  }

  let dayDetailHtml = '';
  if(selectedCalDay){
    dayDetailHtml = buildDayDetail(selectedCalDay, monthEntries);
  }

  document.getElementById('screen').innerHTML = `
  <div class="screen-pad">
    <div class="summary-row">
      <div class="sum-card">
        <div class="sum-head">
          <div class="sum-icon" style="background:rgba(0,122,255,.1)">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#007AFF" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
          </div>
          <span class="sum-label">Przepracowano</span>
        </div>
        <div class="sum-val">${fmtMin(totalMin)||'—'}</div>
      </div>
      <div class="sum-card">
        <div class="sum-head">
          <div class="sum-icon" style="background:rgba(52,199,89,.1)">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#34C759" stroke-width="2.5"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M22 10H2"/></svg>
          </div>
          <span class="sum-label">Do wypłaty</span>
        </div>
        <div class="sum-val">${fmtMoneyN(totalEarn)}</div>
      </div>
    </div>

    <div class="cal-card">
      <div class="cal-wdays">
        ${['Pn','Wt','Śr','Cz','Pt','<span style="color:rgba(255,59,48,.7)">Sb</span>','<span style="color:rgba(255,59,48,.7)">Nd</span>'].map(d=>`<div class="cal-wd">${d}</div>`).join('')}
      </div>
      <div class="cal-grid">${calCells}</div>
    </div>

    <div id="day-detail-wrapper">${dayDetailHtml}</div>

    <button class="card mt8" style="width:calc(100% - 32px);display:flex;align-items:center;padding:14px 16px;gap:10px" onclick="goAddForDay(null)">
      <span style="font-size:22px">＋</span>
      <span style="font-size:17px;color:var(--blue);font-weight:500">Dodaj wpis w tym miesiącu</span>
    </button>
  </div>`;
}

function calTap(datestring){
  if(selectedCalDay===datestring){ selectedCalDay=null; }
  else { selectedCalDay=datestring; }
  // Re-render month without full page reload (smooth)
  const key = datestring.slice(0,7);
  const monthEntries = entries.filter(e=>e.date.startsWith(key));

  // Update selected state on cells
  document.querySelectorAll('.cal-day').forEach(el=>{
    el.classList.remove('sel');
  });
  if(selectedCalDay){
    const cells = document.querySelectorAll('.cal-day');
    const {year,month}=parseYM(key);
    const offset=firstWeekday(year,month);
    const day=parseInt(datestring.split('-')[2]);
    const idx=offset+day-1;
    if(cells[idx]) cells[idx].classList.add('sel');
  }

  const wrapper=document.getElementById('day-detail-wrapper');
  if(wrapper){
    if(selectedCalDay){
      wrapper.innerHTML=buildDayDetail(selectedCalDay, monthEntries);
      wrapper.scrollIntoView({behavior:'smooth',block:'nearest'});
    } else {
      wrapper.innerHTML='';
    }
  }
}

function buildDayDetail(datestring, monthEntries){
  const dayE = monthEntries.filter(e=>e.date===datestring)
               .sort((a,b)=>a.wejscie.localeCompare(b.wejscie));
  const valid = dayE.filter(e=>entryMin(e)>0);
  const totalMin  = valid.reduce((s,e)=>s+entryMin(e),0);
  const totalEarn = valid.reduce((s,e)=>s+entryEarn(e),0);

  const wd = dayOfWeek(datestring);
  const dayName = PL_DAYS_LONG[wd];

  let entriesHTML='';
  if(dayE.length===0){
    entriesHTML=`<div class="empty-day">Brak wpisów — kliknij „Dodaj"</div>`;
  } else {
    dayE.forEach((e,i)=>{
      const min=entryMin(e);
      const earn=entryEarn(e);
      const valid=min>0;
      entriesHTML+=`
      <div class="entry-row2" onclick="goEdit('${e.id}')">
        <div class="et-times">
          <div class="et-line"><div class="et-icon g">▶</div><span class="et-time">${e.wejscie}</span></div>
          <div class="et-line"><div class="et-icon r">■</div><span class="et-time">${e.wyjscie}</span></div>
          ${e.notatka?`<div class="et-note">${escHtml(e.notatka)}</div>`:''}
        </div>
        <div class="et-right">
          ${valid?`<div class="et-dur">${fmtDur(min)}</div>
          <div class="et-earn">${fmtMoneyN(earn)}</div>
          <div class="et-rate">${String(e.stawka).replace('.',',')} zł/h</div>`
          :`<span style="color:var(--orange);font-size:12px">⚠️ Błędny wpis</span>`}
        </div>
      </div>
      ${i<dayE.length-1?'<div class="et-divider"></div>':''}`;
    });
  }

  const statsHtml = valid.length>0?`<div class="day-stats"><span class="day-stat b">${fmtMin(totalMin)}</span><span class="day-stat g">${fmtMoneyN(totalEarn)}</span></div>`:'';

  return `
  <div class="day-card">
    <div class="day-head">
      <div>
        <div class="day-title">${dayName}, ${fmtDateShort(datestring)}</div>
        ${statsHtml}
      </div>
      <button class="pill-btn" onclick="goAddForDay('${datestring}')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
        Dodaj
      </button>
    </div>
    <div class="day-sep"></div>
    ${entriesHTML}
  </div>`;
}

/* ════════════════════════════════════════
   SCREEN: ADD / EDIT FORM
════════════════════════════════════════ */
function renderForm({editId=null, presetDay=null, fromMonthKey=null}={}){
  editingId    = editId;
  formPresetDay = presetDay;

  const isEdit = !!editId;
  const e = isEdit ? entries.find(en=>en.id===editId) : null;

  const defDate = presetDay || (e?.date) || today;
  const defWej  = e?.wejscie  || '08:00';
  const defWyj  = e?.wyjscie  || '16:00';
  const defStaw = e?.stawka   || 25;
  const defNote = e?.notatka  || '';
  const defKey  = fromMonthKey || (e?.date?.slice(0,7)) || todayYM;

  renderNavbar({
    left:  {label:'Anuluj', fn:`cancelForm('${defKey}')`},
    title: isEdit ? 'Edytuj wpis' : 'Nowy wpis',
    right: {label: isEdit ? 'Zapisz' : 'Dodaj', fn:'submitForm()', id:'saveBtn', bold:true}
  });

  document.getElementById('screen').innerHTML = `
  <div class="screen-pad">
    <!-- DATE -->
    <p class="form-sec-title">Data</p>
    <div class="card">
      <div class="form-row">
        <span class="form-label">Data pracy</span>
        <div class="form-right">
          <input type="date" id="fDate" value="${defDate}" onchange="updateCalc()">
        </div>
      </div>
    </div>

    <!-- TIME -->
    <p class="form-sec-title">Czas pracy</p>
    <div class="card">
      <div class="form-row">
        <span class="form-label">Wejście</span>
        <div class="form-right">
          <input type="time" id="fWej" value="${defWej}" onchange="updateCalc()">
        </div>
      </div>
      <div class="form-row">
        <span class="form-label">Wyjście</span>
        <div class="form-right">
          <input type="time" id="fWyj" value="${defWyj}" onchange="updateCalc()">
        </div>
      </div>
      <div id="calcTime"></div>
    </div>

    <!-- RATE -->
    <p class="form-sec-title">Wynagrodzenie</p>
    <div class="card">
      <div class="form-row">
        <span class="form-label">Stawka</span>
        <div class="form-right">
          <input type="number" id="fStaw" value="${defStaw}" min="0.5" step="0.5" oninput="updateCalc()">
          <span class="form-unit">zł/h</span>
        </div>
      </div>
      <div id="calcEarn"></div>
    </div>

    <!-- NOTE -->
    <p class="form-sec-title">Notatka (opcjonalnie)</p>
    <div class="card">
      <div class="form-row">
        <textarea class="form-textarea" id="fNote" placeholder="Np. nadgodziny, projekt X…" rows="2">${escHtml(defNote)}</textarea>
      </div>
    </div>

    ${isEdit?`
    <p class="form-sec-title" style="margin-top:8px"></p>
    <div class="card">
      <div class="del-row tap" onclick="confirmDelete('${editId}','${defKey}')">
        🗑️ Usuń ten wpis
      </div>
    </div>`:''}

    <div style="height:20px"></div>
  </div>`;

  updateCalc();
}

function updateCalc(){
  const wej  = document.getElementById('fWej')?.value  || '';
  const wyj  = document.getElementById('fWyj')?.value  || '';
  const stawEl = document.getElementById('fStaw');
  const stawka = parseFloat(stawEl?.value) || 0;
  const ctEl = document.getElementById('calcTime');
  const ceEl = document.getElementById('calcEarn');
  const saveBtn = document.getElementById('saveBtn');

  if(!wej||!wyj||!ctEl) return;

  const min = Math.max(0, toMin(wyj)-toMin(wej));
  const earn = (min/60)*stawka;
  const valid = min>0;

  if(saveBtn) saveBtn.disabled = !valid;

  if(valid){
    ctEl.innerHTML=`<div class="calc-row"><span style="font-size:15px">✅</span><span class="calc-label">Przepracowano</span><span class="calc-val b">${fmtDur(min)} (${fmtMin(min)})</span></div>`;
    ceEl && (ceEl.innerHTML=stawka>0?`<div class="calc-row"><span style="font-size:15px">💰</span><span class="calc-label">Kwota za ten dzień</span><span class="calc-val g">${fmtMoneyN(earn)}</span></div>`:'');
  } else {
    ctEl.innerHTML=`<div class="warn-row"><span style="font-size:15px">⚠️</span><span>Wyjście musi być późniejsze niż wejście</span></div>`;
    ceEl && (ceEl.innerHTML='');
  }
}

function submitForm(){
  const date  = document.getElementById('fDate').value;
  const wejscie = document.getElementById('fWej').value;
  const wyjscie = document.getElementById('fWyj').value;
  const stawka  = parseFloat(document.getElementById('fStaw').value)||0;
  const notatka = document.getElementById('fNote').value.trim();

  if(!date||!wejscie||!wyjscie){ showToast('Uzupełnij wszystkie pola'); return; }
  const min = toMin(wyjscie)-toMin(wejscie);
  if(min<=0){ showToast('Sprawdź godziny — wyjście przed wejściem'); return; }

  const payload = {date, wejscie, wyjscie, stawka, notatka};

  if(editingId){ updateEntry(editingId, payload); showToast('Wpis zaktualizowany ✓'); }
  else { addEntry(payload); showToast('Wpis dodany ✓'); }

  const key = date.slice(0,7);
  selectedCalDay = date;
  currentMonthKey = key;
  pop();
  // refresh month screen
  setTimeout(()=>{ renderMonth(key); },50);
}

function cancelForm(key){
  pop();
  if(key){ setTimeout(()=>renderMonth(key),30); }
}

function confirmDelete(id, key){
  if(confirm('Usunąć ten wpis?')){
    deleteEntry(id);
    showToast('Wpis usunięty');
    selectedCalDay=null;
    pop();
    setTimeout(()=>renderMonth(key),50);
  }
}

      ${rows.length ? rows : '<div style="padding:14px 16px;font-size:14px;color:var(--text3)">Brak wpisów w tym miesiącu</div>'}

      <div class="pt pt-sum">
        <div>RAZEM</div><div></div><div></div><div></div>
        <div>${fmtDur(totalMin)}</div><div></div>
        <div>${fmtMoneyN(totalEarn)}</div>
      </div>
    </div>
  </div>

  <div class="export-bar">
    <button class="export-btn" onclick="doPrint()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8M16 6l-4-4-4 4M12 2v13"/></svg>
      Eksportuj / Drukuj PDF
    </button>
  </div>`;
}

function doPrint(){ window.print(); }

function goMonth(key){
  selectedCalDay=null;
  push('month',{key});

  push('form',{presetDay:null, fromMonthKey:null});
}
function goAddForDay(day){
  const key = day ? day.slice(0,7) : currentMonthKey;
  push('form',{presetDay:day, fromMonthKey:key});
}
function goEdit(id){
  const e = entries.find(en=>en.id===id);
  if(e) push('form',{editId:id, fromMonthKey:e.date.slice(0,7)});
}
function goExport(key){
  showShareSheet(key);
}

/* ════════════════════════════════════════
   NAVBAR RENDERER
════════════════════════════════════════ */
function renderNavbar({back,left,title,large,right}={}){
  const nb = document.getElementById('navbar');
  let leftHtml='<span></span>', rightHtml='<span></span>';

  if(back){
    leftHtml=`<button class="nb-btn left" onclick="${back.fn}">
      <svg width="10" height="18" viewBox="0 0 10 18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 1L1 9l8 8"/></svg>
      ${back.label}
    </button>`;
  } else if(left){
    leftHtml=`<button class="nb-btn left" onclick="${left.fn}">${left.label}</button>`;
  }
  if(right){
    const bold = right.bold?'style="font-weight:600"':'';
    const id   = right.id?`id="${right.id}"`:'';
    rightHtml=`<button class="nb-btn right" ${id} onclick="${right.fn}" ${bold}>${right.label}</button>`;
  }
  nb.innerHTML=`
    <div class="nb-row">
      ${leftHtml}
      <span class="nb-title">${title||''}</span>
      ${rightHtml}
    </div>
    ${large?`<div class="nb-large">${large}</div>`:''}`;
}

/* ════════════════════════════════════════
   SHARE SHEET / MODAL
════════════════════════════════════════ */
function showShareSheet(key){
  const el=document.getElementById('modal');
  const sheet=document.getElementById('modal-sheet');
  sheet.innerHTML=`
    <div class="sheet-handle"></div>
    <div class="sheet-title">Eksportuj raport — ${monthLabel(key)}</div>
    <div class="share-icons">
      <div class="sh-item" onclick="push('print',{key:'${key}'});closeModal()">
        <div class="sh-bubble" style="background:#fff3e0">📄</div>
        <span class="sh-label">Podgląd PDF</span>
      </div>
      <div class="sh-item" onclick="shareCSV('${key}')">
        <div class="sh-bubble" style="background:#e8f5e9">📊</div>
        <span class="sh-label">Eksport CSV</span>
      </div>
      <div class="sh-item" onclick="closeModal();showToast('Otwórz Podgląd PDF i użyj Udostępnij')">
        <div class="sh-bubble" style="background:#e8f0fe">📧</div>
        <span class="sh-label">Wyślij mailem</span>
      </div>
      <div class="sh-item" onclick="closeModal();showToast('Otwórz Podgląd PDF → Drukuj')">
        <div class="sh-bubble" style="background:#fce4ec">🖨️</div>
        <span class="sh-label">Drukuj</span>
      </div>
    </div>
    <button class="sheet-cancel" onclick="closeModal()">Anuluj</button>`;
  el.classList.add('open');
}

function closeModal(e){
  if(!e||e.target===document.getElementById('modal'))
    document.getElementById('modal').classList.remove('open');
}

/* ════════════════════════════════════════
   CSV EXPORT
════════════════════════════════════════ */
function shareCSV(key){
  closeModal();
  const me = entries
    .filter(e=>e.date.startsWith(key)&&entryMin(e)>0)
    .sort((a,b)=>a.date.localeCompare(b.date)||a.wejscie.localeCompare(b.wejscie));

  let csv='Data,Dzień,Wejście,Wyjście,Czas (hh:mm),Stawka (zł/h),Kwota (zł)\n';
  me.forEach(e=>{
    const min=entryMin(e);
    csv+=`${fmtDateShort(e.date)},${dayShortPL(e.date)},${e.wejscie},${e.wyjscie},${fmtDur(min)},${e.stawka},${entryEarn(e).toFixed(2)}\n`;
  });
  const totalMin=me.reduce((s,e)=>s+entryMin(e),0);
  const totalEarn=me.reduce((s,e)=>s+entryEarn(e),0);
  csv+=`\nRAZEM,,,, ${fmtDur(totalMin)},, ${totalEarn.toFixed(2)}\n`;

  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=`raport_${key}.csv`;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('CSV gotowy do pobrania ✓');
}

/* ════════════════════════════════════════
   TOAST
════════════════════════════════════════ */
let _toastT;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(_toastT);
  _toastT=setTimeout(()=>t.classList.remove('show'),2400);
}

function escHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
